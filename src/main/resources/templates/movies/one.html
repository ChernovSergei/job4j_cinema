<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/headerCinema :: header"></head>
<body>
    <div th:replace="fragments/navigationCinema :: navigation"></div>
    <div class="container">
        <form class="mt-3" th:action="@{/movies/update}" method="post" th:object="${movie}" enctype="multipart/form-data">
            <input type="hidden" name="id" th:field="*{id}">
            <input type="hidden" name="fileId" th:field="*{fileId}">
            <div class="mb-4">
                <label for="name" class="form-label"><b>Name</b></label>
                <input type="text" class="form-control" id="name" name="name"
                       th:field="*{name}"
                       placeholder="A movie name">
            </div>
            <div class="col-3">
                <div class="mb-3">
                    <img th:src="@{/files/{fileId}(fileId=*{fileId})}" class="w-100" alt="No image">
                </div>
                <div class="mb-3">
                    <input class="form-control form-control-sm w-100" type="file" id="formFile" name="file">
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label"><b>Description</b></label>
                <textarea class="form-control" id="description" name="description"
                       th:field="*{description}" rows="10"
                          placeholder="Describe a movie"></textarea>
            </div>
            <div class="mb-3">
            <label for="year" class="form-label"><b>Issue year</b></label>
            <textarea class="form-control" id="year" name="year"
                      th:field="*{year}"
                      placeholder="Year of a movie issue"></textarea>
            </div>
            <div class="mb-3">
            <label for="minimalAge" class="form-label"><b>Minimal Age</b></label>
            <textarea class="form-control" id="minimalAge" name="minimalAge"
                      th:field="*{minimalAge}"
                      placeholder="A child minimal age"></textarea>
            </div>
            <div class="mb-3">
                <label for="durationInMinutes" class="form-label"><b>A movie duration</b></label>
                <textarea class="form-control" id="durationInMinutes" name="durationInMinutes"
                          th:field="*{durationInMinutes}"
                          placeholder="A movie duration"></textarea>
            </div>
            <div class="mb-3">
                <label for="genreId"><b>Genre</b></label>
                <select class="form-control" id="genreId" name="genreId">
                    <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}" th:field="*{genreId}" th:selected="${genre.id==genreId}"></option>
                </select>
            </div>
            <div class="mb-3 row">
                <div class="col-6"></div>
                <div class="col-6">
                    <div class="row">
                        <div class="col-4"><a class="btn btn-light w-100"
                                              th:href="@{/movies}">Cancel</a></div>
                        <div class="col-4"><a class="btn btn-danger w-100"
                                              th:href="@{/movies/delete/{id}(id=${movie.id})}">Delete</a></div>
                        <div class="col-4"><button class="btn btn-success w-100"
                                              type="submit">Update</button></div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <footer th:include="fragments/footerCinema :: footer"></footer>
</body>
</html>
