<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/headerCinema :: header"></head>
<body>
    <div th:replace="fragments/navigationCinema :: navigation"></div>
    <div class="container">
        <form class="mt-3" th:action="@{/tickets/buy}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="userId" th:value="${user.id}">
            <input type="hidden" name="sessionId" th:value="${session_movie.id}">
            <div class="mb-3">
                <a th:text="${movie.name}"></a> movie in the <a th:text="${hall.name}"></a> hall.
            </div>
            <div class="mb-3">
                <label for="rowNumber"><b>Row Number</b></label>
                <select class="form-control" id="rowNumber" name="rowNumber">
                    <option th:each="row : ${#numbers.sequence(1, hall.rowCount)}" th:value="${row}" th:text="${row}"
                    >1</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="placeNumber"><b>Place Number</b></label>
                <select class="form-control" id="placeNumber" name="placeNumber">
                    <option th:each="place : ${#numbers.sequence(1, hall.placeCount)}" th:value="${place}" th:text="${place}"
                    >1</option>
                </select>
            </div>
            <div class="mb-3">
                <a th:text="${user.name}">
                </a>
            </div>
            <div class="mb-3 row">
                <div class="col-6"></div>
                <div class="col-6">
                    <div class="row">
                        <div class="col-6">
                            <a class="btn btn-danger w-100" th:href="@{/tickets}">Cancel</a>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-primary w-100" type="submit">Buy</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <footer th:include="fragments/footerCinema :: footer"></footer>
</body>
</html>
