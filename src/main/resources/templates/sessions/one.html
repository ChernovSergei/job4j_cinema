<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/headerCinema :: header"></head>
<body>
    <div th:replace="fragments/navigationCinema :: navigation"></div>
    <div class="container">
        <form class="mt-3" th:action="@{/sessions/update}" method="post" th:object="${session_movie}" enctype="multipart/form-data">
            <input type="hidden" name="id" th:field="*{id}">
            <div class="mb-3">
                <label for="movieId"><b>Movies</b></label>
                <select class="form-control" id="movieId" name="movieId">
                    <option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.name}"
                            th:field="*{movieId}" th:selected="${movie.id==movieId}"
                    ></option>
                </select>
            </div>
            <div class="mb-4">
                <label for="startTime" class="form-label"><b>Start Time</b></label>
                <input type="datetime-local" class="form-control" id="startTime" name="startTime"
                       th:value="*{startTime}">
            </div>
            <div class="mb-4">
                <label for="endTime" class="form-label"><b>End Time</b></label>
                <input type="datetime-local" class="form-control" id="endTime" name="endTime"
                       th:value="*{endTime}">
            </div>

            <div class="mb-3">
                <label for="hallId"><b>Halls</b></label>
                <select class="form-control" id="hallId" name="hallId">
                    <option th:each="hall : ${halls}" th:value="${hall.id}" th:text="${hall.name}"
                            th:field="*{hallId}" th:selected="${hall.id==hallId}"
                    ></option>
                </select>
            </div>
            <div class="mb-4">
                <label for="price" class="form-label"><b>Session Price</b></label>
                <input type="text" class="form-control" id="price" name="price"
                       th:field="*{price}"
                       placeholder="A session price">
            </div>
            <div class="mb-3 row">
                <div class="col-6"></div>
                <div class="col-6">
                    <div class="row">
                        <div class="col-4"><a class="btn btn-light w-100"
                                              th:href="@{/sessions}">Cancel</a></div>
                        <div class="col-4"><a class="btn btn-danger w-100"
                                              th:href="@{/sessions/delete/{id}(id=${session_movie.id})}">Delete</a></div>
                        <div class="col-4"><button class="btn btn-success w-100"
                                              type="submit">Update</button></div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <footer th:include="fragments/footerCinema :: footer"></footer>
</body>
</html>
